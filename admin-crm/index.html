<nav style="margin-bottom: 20px; padding: 10px; background: #f4f4f4; border-radius: 8px;">
    <button onclick="showSection('kunden')" style="padding: 10px 20px; cursor: pointer;">👥 Kunden</button>
    <button onclick="showSection('reisen')" style="padding: 10px 20px; cursor: pointer;">🏔️ Reisen</button>
</nav>

<div id="section-kunden">
    <h2>Kundenverwaltung</h2>

                <th>ID</th><th>Name</th><th>Ort</th><th>Email</th>
            </tr>
        </thead>
        <tbody id="kunden-daten"></tbody>
    </table>
</div>

<div id="section-reisen" style="display:none;">
    <h2>Reiseverwaltung</h2>
    <table border="1" style="width:100%; border-collapse: collapse;">
        <thead>
            <tr style="background: #eee;">
                <th>Reise-ID</th><th>Titel</th><th>Zeitraum</th><th>Preis</th><th>Status</th>
            </tr>
        </thead>
        <tbody id="reisen-daten"></tbody>
